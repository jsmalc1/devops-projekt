services:
  # 1. Baza podataka
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data # Zahtjev: Perzistentnost podataka
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Queue/Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Naš API Servis
  api:
    build:
      context: ./api
      target: development # Gađamo razvojnu fazu zbog hot-reloada
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app            # Mapira tvoj lokalni kod u kontejner (hot-reload)
      - /app/node_modules     # Štiti kontejnerske module od prebrisavanja
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Naš pozadinski Worker
  worker:
    build:
      context: ./worker
      target: development
    volumes:
      - ./worker:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. Naš Web Frontend
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

# Definiranje perzistentnog volumena za bazu
volumes:
  pgdata: