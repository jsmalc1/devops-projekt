name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  validate:
    name: Matrix validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, api, worker]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd ${{ matrix.service }} && npm install

  trivy-iac-scan:
    name: Trivy repository/IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy IaC scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-config-sarif
          path: trivy-config.sarif
 
  build-scan-publish:
    name: Matrix build-scan-publish
    needs: [validate, trivy-iac-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [frontend, api, worker]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build an image from Dockerfile
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/projekt-${{ matrix.service }}:latest ./${{ matrix.service }}
          
      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/projekt-${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Image scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}-image-sarif
          path: trivy-${{ matrix.service }}-image.sarif
          
      - name: Push image to GitHub Container Registry
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/projekt-${{ matrix.service }}:latest